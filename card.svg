<svg xmlns="http://www.w3.org/2000/svg" width="550" height="300" viewBox="0 0 550 300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020b14"/>
      <stop offset="50%" stop-color="#051726"/>
      <stop offset="100%" stop-color="#01060a"/>
    </linearGradient>

    <!-- Cyber Grid Pattern to mimic the network background -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="40" cy="40" r="1.5" fill="#00ffff" opacity="0.4"/>
      <!-- Extra random cyber lines to mimic the original -->
      <path d="M 0 20 L 20 20 L 20 40" fill="none" stroke="#00ffff" stroke-width="1" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="1" fill="#00ffff" opacity="0.3"/>
    </pattern>

    <!-- Clip Path for Profile Picture (Rounded Square) -->
    <clipPath id="profile-clip">
      <rect x="30" y="75" width="90" height="90" rx="15"/>
    </clipPath>

    <!-- Clip Path for IITM Logo (Perfect Circle to remove any rough edges) -->
    <clipPath id="logo-clip">
      <circle cx="490" cy="45" r="23"/>
    </clipPath>
    
    <!-- Filter for text glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="550" height="300" rx="10" fill="url(#bg-grad)"/>
  <!-- Overlay Pattern -->
  <rect width="550" height="300" rx="10" fill="url(#grid)"/>

  <!-- Top Header -->
  <text x="30" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" filter="url(#glow)">mantis's Profile</text>

  <!-- Top Right Logo Container (White circle behind it) -->
  <circle cx="490" cy="45" r="23" fill="#ffffff"/>
  <!-- Image loads from local repo. User must upload iitm.png -->
  <image href="./iitm.png" x="467" y="22" width="46" height="46" clip-path="url(#logo-clip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Profile Picture Container -->
  <rect x="30" y="75" width="90" height="90" rx="15" fill="#1e293b"/>
  <!-- Image loads from local repo. User must upload profile.png -->
  <image href="./profile.png" x="30" y="75" width="90" height="90" clip-path="url(#profile-clip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- User Details -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#a3b8cc">
    <text x="140" y="90" font-weight="bold">name:</text>
    <text x="210" y="90" fill="#ffffff" font-weight="bold">Mantis</text>

    <text x="140" y="115" font-weight="bold">connect:</text>
    <text x="210" y="115" fill="#00ffff" filter="url(#glow)">bsky.app/profile/mantisdarling.bsky.social</text>

    <text x="140" y="140" font-weight="bold">cursus:</text>
    <text x="210" y="140" fill="#ffffff">AI/CyberSec</text>

    <text x="140" y="165" font-weight="bold">grade:</text>
    <text x="210" y="165" fill="#ffffff">Sensei</text>
  </g>

  <!-- Progress Bar Background -->
  <rect x="30" y="200" width="490" height="35" rx="8" fill="#1e293b" opacity="0.8"/>
  <!-- Progress Bar Fill (69% of 490 = 338.1) -->
  <rect x="30" y="200" width="338" height="35" rx="8" fill="#146c94"/>
  <!-- Progress Bar Text -->
  <text x="275" y="223" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">level 69 - 69%</text>

  <!-- Badges -->
  <rect x="30" y="255" width="75" height="25" rx="4" fill="#146c94"/>
  <text x="67.5" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">XPIDER</text>

  <!-- 2205 IITM Badge text with digital font styling -->
  <text x="520" y="272" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="end" filter="url(#glow)">2205 IITM</text>
</svg>
