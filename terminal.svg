<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <style>
    .text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; font-size: 14px; fill: #f8f8f2; }
    .prompt { fill: #f1fa8c; font-weight: bold; }
    .comment { fill: #6272a4; font-style: italic; }
    
    .line1 { opacity: 0; animation: show 0.1s forwards 0.5s; }
    .line2 { opacity: 0; animation: show 0.1s forwards 1.0s; }
    .line3 { opacity: 0; animation: show 0.1s forwards 1.5s; }
    .line4 { opacity: 0; animation: show 0.1s forwards 2.0s; }
    .line5 { opacity: 0; animation: show 0.1s forwards 2.5s; }
    .line6 { opacity: 0; animation: show 0.1s forwards 3.0s; }
    .line7 { opacity: 0; animation: show 0.1s forwards 3.5s; }
    
    @keyframes show {
      to { opacity: 1; }
    }
  </style>
  <rect width="800" height="250" rx="8" fill="#282a36" />
  
  <circle cx="20" cy="20" r="6" fill="#ff5f56" />
  <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="20" r="6" fill="#27c93f" />
  
  <g class="text">
    <text x="20" y="60" class="line1"><tspan class="prompt">mantisdarling $</tspan> cd ~</text>
    <text x="20" y="85" class="line2"><tspan class="prompt">mantisdarling $</tspan> <tspan class="comment"># CS undergrad exploring where AI, security, and policy collide.</tspan></text>
    <text x="20" y="110" class="line3"><tspan class="prompt">mantisdarling $</tspan> <tspan class="comment"># I'm a Computer Science student at IIT Madras, building at the</tspan></text>
    <text x="20" y="135" class="line4"><tspan class="prompt">mantisdarling $</tspan> <tspan class="comment"># intersection of AI systems, cybersecurity, and the policy</tspan></text>
    <text x="20" y="160" class="line5"><tspan class="prompt">mantisdarling $</tspan> <tspan class="comment"># questions neither field likes to answer.</tspan></text>
    <text x="20" y="185" class="line6"><tspan class="prompt">mantisdarling $</tspan> <tspan class="comment"># Most of what I build ends up here sooner or later,</tspan></text>
    <text x="20" y="210" class="line7"><tspan class="prompt">mantisdarling $</tspan> <tspan class="comment"># this is essentially my open notebook.</tspan></text>
  </g>
</svg>
